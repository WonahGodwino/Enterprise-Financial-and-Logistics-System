<svg width="520" height="220" viewBox="0 0 520 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="520" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B91C1C"/>
      <stop offset="1" stop-color="#EF4444"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FCA5A5"/>
      <stop offset="1" stop-color="#F87171"/>
    </linearGradient>
    <filter id="softGlow" x="-40" y="-40" width="600" height="300" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
  </defs>

  <rect x="10" y="10" width="500" height="200" rx="24" fill="url(#bg)"/>

  <g opacity="0.25" stroke="#FCA5A5" stroke-width="2">
    <path d="M40 70H180"/>
    <path d="M40 110H160"/>
    <path d="M40 150H180"/>
    <path d="M340 70H480"/>
    <path d="M360 110H480"/>
    <path d="M340 150H480"/>
  </g>

  <g filter="url(#softGlow)">
    <rect x="200" y="50" width="120" height="120" rx="20" fill="url(#chip)"/>
    <rect x="220" y="70" width="80" height="80" rx="14" stroke="#B91C1C" stroke-width="3" fill="#FEE2E2"/>
    <circle cx="240" cy="90" r="5" fill="#B91C1C"/>
    <circle cx="280" cy="90" r="5" fill="#B91C1C"/>
    <circle cx="240" cy="130" r="5" fill="#B91C1C"/>
    <circle cx="280" cy="130" r="5" fill="#B91C1C"/>
    <path d="M250 90H270V130H250" stroke="#B91C1C" stroke-width="3"/>
  </g>

  <g stroke="#FCA5A5" stroke-width="3" stroke-linecap="round">
    <path d="M180 90L200 100"/>
    <path d="M180 130L200 120"/>
    <path d="M320 100L340 90"/>
    <path d="M320 120L340 130"/>
  </g>

  <text x="260" y="198" text-anchor="middle" fill="#FCA5A5" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
    AI-Powered Intelligence Engine
  </text>
</svg>
