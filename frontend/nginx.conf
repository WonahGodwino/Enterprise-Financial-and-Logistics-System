server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    
    # Handle React Router - THIS FIXES THE 404 ISSUE
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Cache static assets
    location /static {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Don't cache HTML
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
